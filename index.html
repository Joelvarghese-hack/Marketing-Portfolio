<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joel Varghese, Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;700;800;900&family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Pinyon+Script&family=Inter:wght@400;700;900&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #fdf9f5; color: #1a1a1a; font-family: 'Montserrat', sans-serif; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #f5f0eb; }
    ::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 3px; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(36px); } to { opacity: 1; transform: translateY(0); } }
    .reveal { opacity: 0; transform: translateY(36px); transition: opacity 0.75s ease, transform 0.75s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 500; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .modal-box { background: #fff; border-radius: 10px; max-width: 720px; width: 100%; max-height: 80vh; overflow-y: auto; padding: 56px; }
    .modal-box h2 { font-family: 'Work Sans', sans-serif; font-weight: 800; font-size: 32px; margin-bottom: 8px; }
    .modal-box h3 { font-family: 'Work Sans', sans-serif; font-weight: 700; font-size: 18px; margin: 32px 0 10px; }
    .modal-box p { font-family: 'Montserrat', sans-serif; font-size: 14px; line-height: 1.8; color: #444; margin-bottom: 12px; }
    .modal-box a { color: #1a1a1a; }
    .scroll-top-btn { position: fixed; bottom: 36px; right: 36px; z-index: 200; width: 48px; height: 48px; border-radius: 50%; background: #1a1a1a; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(0,0,0,0.18); transition: opacity 0.3s ease, transform 0.2s ease; color: #fff; }
    .scroll-top-btn:hover { transform: translateY(-3px); }
    .scroll-top-btn.hidden { opacity: 0; pointer-events: none; }
    .copyable { cursor: pointer; transition: color 0.2s; user-select: none; -webkit-user-select: none; }
    .copy-toast { position: fixed; bottom: 90px; right: 36px; background: #1a1a1a; color: #fff; padding: 12px 22px; border-radius: 30px; font-family: 'Montserrat', sans-serif; font-size: 13px; z-index: 600; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .copy-toast.show { opacity: 1; }

    /* Hamburger button — hidden by default (desktop & tablet) */
    .hamburger-btn {
      display: none;
      width: 40px; height: 40px;
      background: none; border: none; cursor: pointer;
      padding: 0; position: relative;
      flex-direction: column; justify-content: center; align-items: center; gap: 6px;
    }
    .hamburger-btn span {
      display: block; width: 26px; height: 2.5px;
      background: var(--hb-color, #1a1a1a); border-radius: 2px;
      transition: transform 0.35s ease, opacity 0.25s ease, background 0.3s ease;
      transform-origin: center;
    }
    .hamburger-btn.open span:nth-child(1) { transform: translateY(8.5px) rotate(45deg); }
    .hamburger-btn.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger-btn.open span:nth-child(3) { transform: translateY(-8.5px) rotate(-45deg); }

    /* Mobile menu drawer — hidden by default */
    .mobile-menu {
      position: fixed; top: 70px; left: 0; right: 0; bottom: 0;
      background: rgba(26,26,26,0.98); backdrop-filter: blur(14px);
      z-index: 99;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s ease;
      display: none;
    }
    .mobile-menu.open { opacity: 1; pointer-events: auto; }
    .mobile-menu-inner {
      display: flex; flex-direction: column;
      padding: 48px 32px;
      gap: 4px;
    }
    .mobile-menu-inner a {
      font-family: 'Work Sans', sans-serif;
      font-weight: 800; font-size: 32px;
      letter-spacing: 1px; text-decoration: none;
      color: #fff; text-transform: uppercase;
      padding: 18px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      opacity: 0; transform: translateY(-12px);
      transition: opacity 0.35s ease, transform 0.35s ease, color 0.2s ease;
      transition-delay: calc(var(--i) * 60ms + 100ms);
    }
    .mobile-menu.open .mobile-menu-inner a {
      opacity: 1; transform: translateY(0);
    }
    .mobile-menu-inner a:active { color: #c5b8a0; }
    /* Tablet */
    @media (max-width: 1024px) {
      .skills-grid, .contact-grid { grid-template-columns: 1fr !important; gap: 56px !important; }
      .about-grid { grid-template-columns: 1fr 1fr !important; gap: 48px !important; }
      .tools-grid { grid-template-columns: repeat(3, 1fr) !important; }
      .folders-grid { grid-template-columns: repeat(3, 1fr) !important; }
      .project-inner { flex-direction: column !important; align-items: stretch !important; gap: 48px !important; }
      .project-inner > div { max-width: 100% !important; }
      .project-logo-box { height: 280px !important; }
      nav, section, footer { padding-left: 32px !important; padding-right: 32px !important; }
    }
    /* Phone */
    @media (max-width: 640px) {
      .about-grid {
        grid-template-columns: 1fr !important;
        gap: 32px !important;
      }
      /* Reorder About section on phone: heading → text-block (which contains greeting/paragraphs/connect) → photo+socials */
      .about-text-block { order: 1; }
      .about-photo-block {
        order: 2;
        align-items: center !important;
        min-height: auto !important;
      }
      /* Round photo on phone only */
      .about-photo {
        max-width: 240px !important;
        width: 240px !important;
        height: 240px !important;
        aspect-ratio: 1 / 1 !important;
        border-radius: 50% !important;
      }
      .about-photo img {
        object-position: center 20% !important;
      }
      .tools-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .folders-grid { grid-template-columns: repeat(2, 1fr) !important; }
      section, footer { padding-left: 20px !important; padding-right: 20px !important; }
      .modal-box { padding: 32px 24px !important; }
      /* Nav on phone: J V initials + hamburger menu */
      nav { padding-left: 20px !important; padding-right: 16px !important; }
      .nav-logo-full { display: none !important; }
      .nav-logo-short { display: inline-block !important; }
      .nav-links { display: none !important; }
      .hamburger-btn { display: flex !important; }
      .mobile-menu { display: block !important; }
      .project-inner { padding: 56px 24px !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">

/* ── Tweaks Panel ──────────────────────────────────────────── */
function useTweaks(defaults) {
  const [tweaks, setTweaksState] = React.useState(() => {
    try {
      const saved = localStorage.getItem('jv-portfolio-tweaks');
      return saved ? { ...defaults, ...JSON.parse(saved) } : defaults;
    } catch { return defaults; }
  });
  const setTweak = (key, value) => {
    setTweaksState(prev => {
      const next = { ...prev, [key]: value };
      try { localStorage.setItem('jv-portfolio-tweaks', JSON.stringify(next)); } catch {}
      return next;
    });
  };
  return [tweaks, setTweak];
}

function TweaksPanel({ children }) {
  const [open, setOpen] = React.useState(false);
  return (
    <div style={{ position: 'fixed', bottom: 32, left: 32, zIndex: 400 }}>
      <button onClick={() => setOpen(o => !o)} title="Tweaks"
        style={{ width: 44, height: 44, borderRadius: '50%', background: '#1a1a1a', color: '#fff', border: 'none', cursor: 'pointer', fontSize: 18, display: 'flex', alignItems: 'center', justifyContent: 'center', boxShadow: '0 4px 20px rgba(0,0,0,0.2)', transition: 'transform 0.2s' }}
        onMouseEnter={e => e.currentTarget.style.transform = 'scale(1.08)'}
        onMouseLeave={e => e.currentTarget.style.transform = ''}
      >⚙</button>
      {open && (
        <div style={{ position: 'absolute', bottom: 54, left: 0, background: '#fff', borderRadius: 16, padding: '20px 22px', boxShadow: '0 8px 40px rgba(0,0,0,0.15)', minWidth: 224, border: '1px solid #ede8e2' }}>
          {children}
        </div>
      )}
    </div>
  );
}

function TweakSection({ label }) {
  return <p style={{ fontFamily: "'Montserrat', sans-serif", fontSize: 10, fontWeight: 700, letterSpacing: '1.5px', textTransform: 'uppercase', color: '#999', marginBottom: 14, marginTop: 4 }}>{label}</p>;
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
      <span style={{ fontFamily: "'Montserrat', sans-serif", fontSize: 13, color: '#333' }}>{label}</span>
      <button onClick={() => onChange(!value)}
        style={{ width: 44, height: 24, borderRadius: 12, background: value ? '#1a1a1a' : '#ddd', border: 'none', cursor: 'pointer', position: 'relative', flexShrink: 0, transition: 'background 0.2s' }}
      >
        <span style={{ position: 'absolute', top: 3, left: value ? 23 : 3, width: 18, height: 18, borderRadius: '50%', background: '#fff', transition: 'left 0.2s', display: 'block' }} />
      </button>
    </div>
  );
}

const TWEAK_DEFAULTS = { showPhoto: true, darkNav: true };

/* ── Icons ─────────────────────────────────────────────────── */

function IconLinkedIn() {
  return <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>;
}
function IconFacebook() {
  return <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M24 12.07C24 5.41 18.63 0 12 0S0 5.41 0 12.07C0 18.1 4.39 23.1 10.13 24v-8.44H7.08v-3.49h3.05V9.41c0-3.02 1.79-4.69 4.53-4.69 1.31 0 2.69.23 2.69.23v2.97h-1.51c-1.49 0-1.96.93-1.96 1.89v2.27h3.33l-.53 3.49h-2.8V24C19.61 23.1 24 18.1 24 12.07z"/></svg>;

function IconInstagram() {
  return <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.16c3.2 0 3.58.01 4.85.07 1.17.05 1.8.25 2.23.41.56.22.96.48 1.38.9.42.42.68.82.9 1.38.16.42.36 1.06.41 2.23.06 1.27.07 1.65.07 4.85s-.01 3.58-.07 4.85c-.05 1.17-.25 1.8-.41 2.23-.22.56-.48.96-.9 1.38-.42.42-.82.68-1.38.9-.42.16-1.06.36-2.23.41-1.27.06-1.65.07-4.85.07s-3.58-.01-4.85-.07c-1.17-.05-1.8-.25-2.23-.41a3.71 3.71 0 01-1.38-.9 3.71 3.71 0 01-.9-1.38c-.16-.42-.36-1.06-.41-2.23C2.17 15.58 2.16 15.2 2.16 12s.01-3.58.07-4.85c.05-1.17.25-1.8.41-2.23.22-.56.48-.96.9-1.38.42-.42.82-.68 1.38-.9.42-.16 1.06-.36 2.23-.41C8.42 2.17 8.8 2.16 12 2.16M12 0C8.74 0 8.33.01 7.05.07 5.78.13 4.9.33 4.14.63a5.88 5.88 0 00-2.13 1.38A5.88 5.88 0 00.63 4.14C.33 4.9.13 5.78.07 7.05.01 8.33 0 8.74 0 12s.01 3.67.07 4.95c.06 1.27.26 2.15.56 2.91.31.79.73 1.46 1.38 2.13a5.88 5.88 0 002.13 1.38c.76.3 1.64.5 2.91.56C8.33 23.99 8.74 24 12 24s3.67-.01 4.95-.07c1.27-.06 2.15-.26 2.91-.56a5.88 5.88 0 002.13-1.38 5.88 5.88 0 001.38-2.13c.3-.76.5-1.64.56-2.91.06-1.28.07-1.69.07-4.95s-.01-3.67-.07-4.95c-.06-1.27-.26-2.15-.56-2.91a5.88 5.88 0 00-1.38-2.13A5.88 5.88 0 0019.86.63c-.76-.3-1.64-.5-2.91-.56C15.67.01 15.26 0 12 0zm0 5.84a6.16 6.16 0 100 12.32 6.16 6.16 0 000-12.32zM12 16a4 4 0 110-8 4 4 0 010 8zm6.41-11.85a1.44 1.44 0 100 2.88 1.44 1.44 0 000-2.88z"/></svg>;

function IconArrow() {
  return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>;
}
function IconUp() {
  return <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>;
}
function IconFolder() {
  return (
    <svg width="80" height="64" viewBox="0 0 80 64" fill="none">
      <path d="M4 8a4 4 0 014-4h20l6 6h38a4 4 0 014 4v42a4 4 0 01-4 4H8a4 4 0 01-4-4V8z" fill="#d2c3b4" stroke="#a89684" strokeWidth="1.5"/>

    </svg>

}
function IconCert() {
  return (
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="11" r="7" stroke="#1a1a1a" strokeWidth="1.8"/>
      <path d="M10 17.5L8 26l6-3 6 3-2-8.5" stroke="#1a1a1a" strokeWidth="1.8" strokeLinejoin="round"/>
      <path d="M11 11l2 2 4-4" stroke="#1a1a1a" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>

function ToolLogo({ src, name }) {
  return (
    <div style={{ width: 48, height: 48, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
      <img src={src} alt={name} style={{ maxWidth: '100%', maxHeight: '100%', objectFit: 'contain' }} />
    </div>
  );
}

/* ── Hooks ─────────────────────────────────────────────────── */
function useReveal() {
  const ref = React.useRef(null);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { el.classList.add('visible'); obs.unobserve(el); } }, { threshold: 0.1 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return ref;
}

function useCopy() {
  const [toast, setToast] = React.useState('');
  const copy = (text, label) => {
    navigator.clipboard.writeText(text).then(() => { setToast(`${label} copied!`); setTimeout(() => setToast(''), 1800); });
  };
  return [toast, copy];
}

function ScrollTopBtn() {
  const [show, setShow] = React.useState(false);
  React.useEffect(() => {
    const h = () => setShow(window.scrollY > window.innerHeight * 0.5);
    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h);
  }, []);
  return (
    <button className={`scroll-top-btn${show ? '' : ' hidden'}`} onClick={() => window.scrollTo({ top: 0, behavior: 'smooth' })} aria-label="Scroll to top"><IconUp /></button>
  );
}

/* ── NAV ───────────────────────────────────────────────────── */
function Nav({ tweaks }) {
  const [scrolled, setScrolled] = React.useState(false);
  const [active, setActive] = React.useState('');
  const [menuOpen, setMenuOpen] = React.useState(false);
  React.useEffect(() => {
    const h = () => setScrolled(window.scrollY > 50);
    window.addEventListener('scroll', h);
    return () => window.removeEventListener('scroll', h);
  }, []);
  React.useEffect(() => {
    document.body.style.overflow = menuOpen ? 'hidden' : '';
    return () => { document.body.style.overflow = ''; };
  }, [menuOpen]);
  const links = ['About', 'Skills', 'Projects', 'Contact'];
  const bg = scrolled || menuOpen ? (tweaks.darkNav ? 'rgba(26,26,26,0.96)' : 'rgba(253,249,245,0.96)') : 'transparent';
  const tc = scrolled || menuOpen ? (tweaks.darkNav ? '#fff' : '#1a1a1a') : '#1a1a1a';
  const handleNavClick = () => setMenuOpen(false);
  return (
    <>
      <nav style={{ position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100, display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '0 60px', height: 70, background: bg, backdropFilter: (scrolled || menuOpen) ? 'blur(14px)' : 'none', transition: 'background 0.4s ease', boxShadow: scrolled ? '0 1px 0 rgba(0,0,0,0.07)' : 'none' }}>
        <a href="#hero" onClick={handleNavClick} style={{ textDecoration: 'none', opacity: scrolled && !menuOpen ? 0 : 1, pointerEvents: scrolled && !menuOpen ? 'none' : 'auto', transition: 'opacity 0.3s ease', flexShrink: 0 }}>
          <span className="nav-logo-full" style={{ fontFamily: "'Pinyon Script', cursive", fontSize: 32, color: tc, transition: 'color 0.3s', lineHeight: 1 }}>Joel Varghese</span>
          <span className="nav-logo-short" style={{ display: 'none', fontFamily: "'Pinyon Script', cursive", fontSize: 32, color: tc, transition: 'color 0.3s', lineHeight: 1, letterSpacing: '4px' }}>JV</span>
        </a>
        <div className="nav-links" style={{ display: 'flex', gap: 44, alignItems: 'center' }}>
          {links.map(l => (
            <a key={l} href={`#${l.toLowerCase()}`}
              style={{ fontFamily: "'Work Sans', sans-serif", fontWeight: 700, fontSize: 14, letterSpacing: '1.2px', textDecoration: 'none', color: tc, textTransform: 'uppercase', opacity: active === l ? 1 : 0.65, transition: 'opacity 0.2s' }}
              onMouseEnter={() => setActive(l)} onMouseLeave={() => setActive('')}
            >{l}</a>
          ))}
        </div>
        <button
          className={`hamburger-btn${menuOpen ? ' open' : ''}`}
          onClick={() => setMenuOpen(o => !o)}
          aria-label={menuOpen ? 'Close menu' : 'Open menu'}
          aria-expanded={menuOpen}
          style={{ '--hb-color': tc }}
        >
          <span></span>
          <span></span>
          <span></span>
        </button>
      </nav>
      <div className={`mobile-menu${menuOpen ? ' open' : ''}`} aria-hidden={!menuOpen}>
        <div className="mobile-menu-inner">
          {links.map((l, i) => (
            <a key={l} href={`#${l.toLowerCase()}`} onClick={handleNavClick}
              style={{ '--i': i }}
            >{l}</a>
          ))}
        </div>
      </div>
    </>
  );
}

/* ── HERO ──────────────────────────────────────────────────── */
function Hero() {
  return (
    <section id="hero" style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: '120px 60px 80px', background: '#fdf9f5', position: 'relative', overflow: 'hidden', textAlign: 'center' }}>
      <div style={{ width: '100%', maxWidth: 1400, margin: '0 auto', position: 'relative', zIndex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center' }}>
        <h1 style={{ fontFamily: "'Work Sans', sans-serif", fontWeight: 900, fontSize: 'clamp(72px, 14vw, 220px)', lineHeight: 0.9, letterSpacing: '-6px', color: '#1a1a1a', textTransform: 'uppercase', animation: 'fadeUp 0.8s ease both', animationDelay: '0.1s' }}>PORTFOLIO</h1>
        <p style={{ fontFamily: "'Pinyon Script', cursive", fontSize: 'clamp(60px, 10vw, 150px)', color: '#1a1a1a', animation: 'fadeUp 0.8s ease both', animationDelay: '0.25s', marginTop: 28, marginBottom: 56, lineHeight: 1.1 }}>Joel Varghese</p>
        <div style={{ display: 'flex', gap: 18, animation: 'fadeUp 0.8s ease both', animationDelay: '0.4s', flexWrap: 'wrap', justifyContent: 'center' }}>
          <a href="#projects" style={{ fontFamily: "'Work Sans', sans-serif", fontWeight: 700, fontSize: 15, letterSpacing: '0.5px', textDecoration: 'none', padding: '17px 38px', borderRadius: 40, background: '#1a1a1a', color: '#fff', display: 'flex', alignItems: 'center', gap: 10, transition: 'transform 0.2s ease, box-shadow 0.2s ease' }}
            onMouseEnter={e => { e.currentTarget.style.transform = 'translateY(-2px)'; e.currentTarget.style.boxShadow = '0 8px 28px rgba(0,0,0,0.2)'; }}
            onMouseLeave={e => { e.currentTarget.style.transform = ''; e.currentTarget.style.boxShadow = ''; }}

                  style={{ ...inputBase('message'), resize: 'vertical', minHeight: 130 }}
                  onFocus={e => e.target.style.borderColor = '#1a1a1a'}
                  onBlur={e => e.target.style.borderColor = errors.message ? '#c0392b' : '#ddd'}
                />
                {errors.message && <p style={{ fontFamily: "'Montserrat', sans-serif", fontSize: 12, color: '#c0392b', marginTop: 5 }}>{errors.message}</p>}
              </div>
              <button type="submit" style={{ padding: '17px 38px', borderRadius: 40, border: 'none', background: '#1a1a1a', color: '#fff', fontFamily: "'Work Sans', sans-serif", fontWeight: 700, fontSize: 15, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 10, alignSelf: 'flex-start', transition: 'opacity 0.2s, transform 0.2s' }}
                onMouseEnter={e => { e.currentTarget.style.opacity = '0.85'; e.currentTarget.style.transform = 'translateY(-2px)'; }}
                onMouseLeave={e => { e.currentTarget.style.opacity = '1'; e.currentTarget.style.transform = ''; }}
              >Send Message <IconArrow /></button>
            </form>
          )}
        </div>
      </div>
      {toast && <div className="copy-toast show">{toast}</div>}
    </section>
  );
}
